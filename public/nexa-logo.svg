<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a3a52" stroke-width="2" opacity="0.3"/>
  
  <!-- Knight Head (Stylized) -->
  <g transform="translate(100, 70)">
    <!-- Knight shape -->
    <path d="M 0 -20 L 8 -15 L 10 -5 L 8 5 L 5 10 L -5 10 L -8 5 L -10 -5 L -8 -15 Z" 
          fill="#1a3a52" stroke="#2a5a8a" stroke-width="1"/>
    
    <!-- Knight mane lines -->
    <line x1="-5" y1="-8" x2="-8" y2="-12" stroke="#2a5a8a" stroke-width="1.5"/>
    <line x1="0" y1="-15" x2="0" y2="-20" stroke="#2a5a8a" stroke-width="1.5"/>
    <line x1="5" y1="-8" x2="8" y2="-12" stroke="#2a5a8a" stroke-width="1.5"/>
    
    <!-- Gold accent -->
    <circle cx="0" cy="0" r="3" fill="#d4a843"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="70" cy="85" r="2" fill="#2a5a8a" opacity="0.5"/>
  <circle cx="130" cy="85" r="2" fill="#2a5a8a" opacity="0.5"/>
  <circle cx="75" cy="120" r="1.5" fill="#d4a843" opacity="0.6"/>
  <circle cx="125" cy="120" r="1.5" fill="#d4a843" opacity="0.6"/>
  <circle cx="100" cy="130" r="1.5" fill="#2a5a8a" opacity="0.4"/>
  
  <!-- Text: NEXA -->
  <text x="100" y="155" font-family="serif" font-size="16" font-weight="bold" 
        fill="#1a3a52" text-anchor="middle" letter-spacing="2">NEXA</text>
  
  <!-- Text: CHESS ACADEMY -->
  <text x="100" y="172" font-family="serif" font-size="9" 
        fill="#d4a843" text-anchor="middle" letter-spacing="1">CHESS ACADEMY</text>
</svg>